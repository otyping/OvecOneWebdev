stages:
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:latest
  IMAGE_TAG_DEMO: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  IMAGE_TAG_DEMO_LATEST: $CI_REGISTRY_IMAGE:demo

