<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVEC One</title>
    <link rel="icon" type="image/png" href="https://cdn.builder.io/api/v1/image/assets%2Fa061ccedc21643e89c15d64ceb68a9d5%2Fd6cf903c88954016a06c1dbcdc8ff7c4" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/main.tsx"></script>
    <script>
      // Force set the document title to override Builder.io preview
      document.title = "OVEC One";
      // Also observe title changes and reset if needed
      const observer = new MutationObserver(() => {
        if (document.title !== "OVEC One") {
          document.title = "OVEC One";
        }
      });
      observer.observe(document.querySelector('head'), { childList: true, subtree: true });
    </script>
  </body>
</html>
